<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream - Watch Your Favorite Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f23;
            color: white;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            margin: 0 2rem;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.8;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=1920') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 2rem;
        }

        .hero-content h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            color: #fff;
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .anime-card {
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .anime-poster {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .anime-info {
            padding: 1.5rem;
        }

        .anime-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .anime-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1rem;
        }

        /* Player Modal */
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .player-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            width: 100%;
            height: 100%;
        }

        .video-player {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .close-player {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
            }

            .search-box {
                margin: 0;
                order: 3;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <div class="logo">🎌 AnimeStream</div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search anime..." id="searchInput">
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#popular">Popular</a></li>
                <li><a href="#recent">Recent</a></li>
                <li><a href="#genres">Genres</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Watch Anime Online</h1>
            <p>Thousands of episodes, subbed and dubbed. Stream in HD quality.</p>
            <a href="#popular" class="cta-button">Start Watching</a>
        </div>
    </section>

    <!-- Main Content -->
    <div class="container">
        <!-- Popular Anime -->
        <section id="popular">
            <h2 class="section-title">Popular Anime</h2>
            <div class="anime-grid" id="popularGrid">
                <!-- Anime cards will be populated by JS -->
            </div>
        </section>

        <!-- Recent Episodes -->
        <section id="recent">
            <h2 class="section-title">Recent Episodes</h2>
            <div class="anime-grid" id="recentGrid">
                <!-- Anime cards will be populated by JS -->
            </div>
        </section>
    </div>

    <!-- Video Player Modal -->
    <div class="player-modal" id="playerModal">
        <div class="player-container">
            <button class="close-player" id="closePlayer">&times;</button>
            <video class="video-player" id="videoPlayer" controls preload="metadata">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        // Sample anime data (replace with your own legal video sources)
        const animeData = [
            {
                id: 1,
                title: "One Piece",
                episodes: 1000,
                type: "TV",
                poster: "https://via.placeholder.com/300x400/FF6B6B/FFFFFF?text=One+Piece",
                videoUrl: "https://www.retrocrush.tv/livetv //
            },
            {
                id: 2,
                title: "Attack on Titan",
                episodes: 89,
                type: "TV",
                poster: "https://via.placeholder.com/300x400/4ECDC4/FFFFFF?text=Attack+on+Titan",
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            {
                id: 3,
                title: "Demon Slayer",
                episodes: 55,
                type: "TV",
                poster: "https://via.placeholder.com/300x400/FECA57/000000?text=Demon+Slayer",
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            {
                id: 4,
                title: "Jujutsu Kaisen",
                episodes: 47,
                type: "TV",
                poster: "https://via.placeholder.com/300x400/45B7D1/FFFFFF?text=Jujutsu+Kaisen",
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            {
                id: 5,
                title: "Naruto",
                episodes: 720,
                type: "TV",
                poster: "https://via.placeholder.com/300x400/96CEB4/000000?text=Naruto",
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            {
                id: 6,
                title: "Dragon Ball",
                episodes: 153,
                type: "TV",
                poster: "https://via.placeholder.com/300x400/FFEAA7/000000?text=Dragon+Ball",
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            }
        ];

        // Initialize the page
        function init() {
            renderAnimeGrid('popularGrid', animeData.slice(0, 6));
            renderAnimeGrid('recentGrid', animeData.slice(0, 6));
            setupEventListeners();
        }

        // Render anime grid
        function renderAnimeGrid(containerId, data) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(anime => `
                <div class="anime-card" data-video="${anime.videoUrl}">
                    <img src="${anime.poster}" alt="${anime.title}" class="anime-poster">
                    <div class="anime-info">
                        <h3 class="anime-title">${anime.title}</h3>
                        <div class="anime-meta">
                            <span><i class="fas fa-play"></i> ${anime.episodes} eps</span>
                            <span><i class="fas fa-tag"></i> ${anime.type}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Setup event listeners
        function setupEventListeners() {
            // Play video on card click
            document.addEventListener('click', (e) => {
                const card = e.target.closest('.anime-card');
                if (card) {
                    const videoUrl = card.dataset.video;
                    playVideo(videoUrl);
                }
            });

            // Close player
            document.getElementById('closePlayer').addEventListener('click', closePlayer);
            document.getElementById('playerModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closePlayer();
            });

            // Search functionality
            document.getElementById('searchInput').addEventListener('input', handleSearch);
        }

        // Play video
        function playVideo(url) {
            const player = document.getElementById('videoPlayer');
            const modal = document.getElementById('playerModal');
            
            // For YouTube embed
            player.src = url;
            modal.style.display = 'flex';
            player.play();
        }

        // Close player
        function closePlayer() {
            const modal = document.getElementById('playerModal');
            const player = document.getElementById('videoPlayer');
            modal.style.display = 'none';
            player.pause();
            player.src = '';
        }

        // Search functionality
        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.anime-card');
            
            cards.forEach(card => {
                const title = card.querySelector('.anime-title').textContent.toLowerCase();
                card.style.display = title.includes(query) ? 'block' : 'none';
            });
        }

        // Smooth scrolling for nav links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
